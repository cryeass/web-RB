<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelacakan Alumni (Tracer Study)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in border border-slate-100">
                <div class="flex flex-col items-center mb-8">
                    <div class="p-3 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-200">
                        <i data-lucide="graduation-cap" class="w-8 h-8 text-white"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">Tracer Study</h1>
                    <p class="text-slate-500 mt-1">Sistem Pelacakan Alumni</p>
                </div>

                <div class="space-y-4">
                    <div id="login-error" class="hidden p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg flex items-center gap-2 mb-4">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i>
                        <span id="error-message">Username atau Password salah!</span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                        <input type="text" id="login-username" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Masukkan username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="login-password" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                    </div>
                    <div class="flex gap-4 pt-2">
                        <button onclick="auth.login('alumni')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-md shadow-blue-100">
                            Masuk Alumni
                        </button>
                        <button onclick="auth.login('admin')" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-md shadow-slate-100">
                            Masuk Admin
                        </button>
                    </div>
                </div>
                <p class="text-center text-sm text-slate-400 mt-8 italic">Gunakan username 'admin' untuk demo admin, lainnya untuk alumni.</p>
            </div>
        </div>

        <!-- Dashboard View (Hidden by default) -->
        <div id="dashboard-view" class="hidden min-h-screen flex flex-col md:flex-row">
            <!-- Sidebar -->
            <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col">
                <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                    <div class="p-2 bg-blue-600 rounded-lg">
                        <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="font-bold text-lg text-slate-800 tracking-tight">Tracer Study</span>
                </div>
                
                <nav class="flex-1 p-4 space-y-1 overflow-y-auto" id="sidebar-nav">
                    <!-- Nav items will be injected here -->
                </nav>

                <div class="p-4 border-t border-slate-100">
                    <button onclick="auth.logout()" class="flex items-center gap-3 w-full px-4 py-2 text-slate-600 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        <span class="font-medium">Keluar</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
                <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
                    <h2 id="page-title" class="text-xl font-semibold text-slate-800">Dashboard</h2>
                    <div class="flex items-center gap-4">
                        <span id="user-role-badge" class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full uppercase tracking-wider">Alumni</span>
                        <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden flex items-center justify-center">
                            <i data-lucide="user" class="w-6 h-6 text-slate-500"></i>
                        </div>
                    </div>
                </header>

                <div id="content-area" class="flex-1 overflow-y-auto p-8">
                    <!-- Content will be injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Templates and Scripts will follow in the next steps -->
    <script src="app.js"></script>
</body>
</html>
